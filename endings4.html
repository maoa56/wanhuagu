<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>迷雾未明 - 解谜游戏终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #808080;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            overflow-y: auto;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="rgba(0,0,0,0.1)"/></svg>');
            background-repeat: repeat;
            background-size: 100px;
            opacity: 0.3;
            z-index: -1;
        }
        
        .container {
            max-width: 600px;
            padding: 40px;
            border: 2px solid #fff;
            background-color: rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            z-index: 1;
            margin-top: 40px;
            margin-bottom: 40px;
        }
        
        .title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #fff;
        }
        
        .content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .failure-text {
            font-size: 24px;
            font-weight: bold;
            color: #ff0000;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }
        
        .button {
            padding: 10px 20px;
            background-color: #000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
        }
        
        .button:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">迷雾未明</div>
        <div class="content">
            <p>我们按照提供的线索去追查，线索很快就中断了，本次案件将作为万花谷的疑案放入档案库，希望未来能有机会破获此案。</p>
        </div>
        <div class="failure-text">追凶失败，请再仔细找找线索吧</div>
        <a href="index.html" class="button">返回主页</a>
    </div>
    
    <script>
        // 页面加载时清除登录状态
        window.onload = function() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('isVisitor');
        };
    </script>
</body>
</html>
