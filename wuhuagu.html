<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万花谷 - 解谜游戏终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #e6e6fa;
            color: #000;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            border: 2px solid #000;
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .back-button {
            padding: 8px 16px;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        
        .content {
            padding: 30px;
            border: 2px solid #000;
            background-color: rgba(255, 255, 255, 0.3);
            line-height: 1.8;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .paragraph {
            margin-bottom: 20px;
            text-indent: 2em;
        }
        
        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .content {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-button">返回主页</a>
        </div>
        
        <div class="content">
            <div class="page-title">万花谷</div>
            
            <div class="paragraph">
                大唐开元二十三年，万花谷主东方宇轩游历四方，恍惚间误入秦岭青岩，叹西部山间竟有如此仙处，于是招纳贤士在此隐居，并命之为"万花谷"。
            </div>
            
            <div class="paragraph">
                本谷环境优美，交通方便，广纳各路有志之士，谷中有《医经》、《毒经》等著作可供阅读，以及各类珍惜药草，每年谷中会与各大门派携手举办武学交流活动。
            </div>
        </div>
    </div>
    
    <script>
        let autoLogoutTimer;
        
        function resetAutoLogout() {
            clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(function() {
                // 清除登录状态和会话状态
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('isVisitor');
                sessionStorage.removeItem('hasSeenDisclaimer');
                // 返回主页
                window.location.href = 'index.html';
            }, 10 * 60 * 1000); // 10分钟
        }
        
        function setupAutoLogout() {
            // 监听用户活动
            window.addEventListener('click', resetAutoLogout);
            window.addEventListener('mousemove', resetAutoLogout);
            window.addEventListener('keypress', resetAutoLogout);
            window.addEventListener('scroll', resetAutoLogout);
            
            // 初始设置定时器
            resetAutoLogout();
        }
        
        window.onload = function() {
            setupAutoLogout();
        }
    </script>
</body>
</html>
