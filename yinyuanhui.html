<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐元会 - 解谜游戏终端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #e6e6fa;
            color: #000;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px;
            border: 2px solid #000;
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .back-button {
            padding: 8px 16px;
            background-color: #000;
            color: #fff;
            border: 2px solid #000;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            text-decoration: none;
            display: inline-block;
        }
        
        .content {
            padding: 30px;
            border: 2px solid #000;
            background-color: rgba(255, 255, 255, 0.3);
            line-height: 1.8;
        }
        
        .page-title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .paragraph {
            margin-bottom: 20px;
            text-indent: 2em;
        }
        
        .secret-info {
            margin-top: 30px;
            padding: 20px;
            border: 1px solid #000;
            background-color: rgba(0, 0, 0, 0.1);
        }
        
        .secret-title {
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                gap: 10px;
            }
            
            .page-title {
                font-size: 20px;
            }
            
            .content {
                padding: 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-button">返回主页</a>
        </div>
        
        <div class="content">
            <div class="page-title">隐元会</div>
            
            <div class="paragraph">
                隐元会，行事隐秘、架构严密，成员遍布朝野江湖，化身乞丐、商贩、细作等各色身份，无孔不入地搜集武林与朝堂秘闻，垄断天下情报，同时以铁血暗杀手段清除异己、维系秩序，江湖中几乎不存在其不知晓的秘密，堪称掌控江湖信息命脉、暗中操盘局势的地下势力。
            </div>
            
            <div class="secret-info">
                <div class="secret-title">重要机密：</div>
                拥有记录着各大门派机密的《玉衡秘卷》，目前在玉贤手中掌握。
            </div>
        </div>
    </div>
    
    <script>
        let autoLogoutTimer;
        
        function resetAutoLogout() {
            clearTimeout(autoLogoutTimer);
            autoLogoutTimer = setTimeout(function() {
                // 清除登录状态、解锁状态和会话状态
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('isVisitor');
                localStorage.removeItem('monitoringUnlocked');
                sessionStorage.removeItem('hasSeenDisclaimer');
                // 返回主页
                window.location.href = 'index.html';
            }, 10 * 60 * 1000); // 10分钟
        }
        
        function setupAutoLogout() {
            // 监听用户活动
            window.addEventListener('click', resetAutoLogout);
            window.addEventListener('mousemove', resetAutoLogout);
            window.addEventListener('keypress', resetAutoLogout);
            window.addEventListener('scroll', resetAutoLogout);
            
            // 初始设置定时器
            resetAutoLogout();
        }
        
        window.onload = function() {
            setupAutoLogout();
        }
    </script>
</body>
</html>
